{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- Header -->

    <div class="mb-8">

        <h1 class="text-4xl font-bold text-slate-800">
            Add Expense
        </h1>

        <p class="text-slate-500 mt-1">
            Record a new expense and keep your spending updated.
        </p>

    </div>

    <!-- Form Card -->

    <div class="bg-blue-50 border border-blue-100 rounded-2xl shadow-md p-8">

        <h3 class="text-2xl font-semibold text-slate-800 mb-6">
            Expense Details
        </h3>

        <form method="post">

            <!-- Category -->

            <div class="mb-5">

                <label class="block text-slate-700 font-medium mb-2">
                    Category
                </label>

                <input
                    type="text"
                    name="category"
                    placeholder="Food, Travel, Shopping..."
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Amount -->

            <div class="mb-5">

                <label class="block text-slate-700 font-medium mb-2">
                    Amount
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    placeholder="Enter amount"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Description -->

            <div class="mb-5">

                <label class="block text-slate-700 font-medium mb-2">
                    Description
                </label>

                <input
                    type="text"
                    name="description"
                    placeholder="Expense description"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Date -->

            <div class="mb-6">

                <label class="block text-slate-700 font-medium mb-2">
                    Date
                </label>

                <input
                    type="date"
                    name="date"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Buttons -->

            <div class="flex gap-3">

                <button
                    type="submit"
                    class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">

                    Add Expense

                </button>

                <a href="/expenses"
                   class="bg-slate-600 text-white px-6 py-3 rounded-lg hover:bg-slate-700 transition">

                    Back

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
