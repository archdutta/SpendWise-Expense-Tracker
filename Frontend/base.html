<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpendWise</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100">

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-slate-700 text-white border-r border-slate-600">

        <!-- Logo -->
        <div class="p-6 border-b border-slate-600">

            <h1 class="text-3xl font-bold text-blue-300">
                SpendWise
            </h1>

            <p class="text-slate-300 text-sm mt-1">
                Track Smarter. Save Better.
            </p>

        </div>

        <!-- Navigation -->
        <nav class="p-4 space-y-2">

            <a href="/dashboard"
               class="block px-4 py-3 rounded-lg bg-blue-500 hover:bg-blue-600 transition">
                Dashboard
            </a>

            <a href="/expenses"
               class="block px-4 py-3 rounded-lg hover:bg-slate-600 transition">
                Expenses
            </a>

            <a href="/budget"
               class="block px-4 py-3 rounded-lg hover:bg-slate-600 transition">
                Budget
            </a>

            <a href="/logout"
               class="block px-4 py-3 rounded-lg text-red-200 hover:bg-red-500 hover:text-white transition">
                Logout
            </a>

        </nav>

    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8">

        {% block content %}
        {% endblock %}

    </main>

</div>

</body>
</html>
