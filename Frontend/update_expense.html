<!DOCTYPE html>

<html>

<head>


<title>SpendWise - Update Expense</title>

<link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">


</head>

<body class="bg-light">

<div class="container mt-5">


<div class="card shadow mx-auto"
     style="max-width: 600px;">

    <div class="card-body p-4">

        <h2 class="text-primary text-center">
        SpendWise
        </h2>

        <p class="text-center text-muted">
            Update Expense
        </p>

        <hr>

        <form method="post">

            <div class="mb-3">

                <label class="form-label">
                    Category
                </label>

                <input
                    type="text"
                    name="category"
                    value="{{ expense.category }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Amount
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="amount"
                    value="{{ expense.amount }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <input
                    type="text"
                    name="description"
                    value="{{ expense.description }}"
                    class="form-control"
                    required>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Date
                </label>

                <input
                    type="date"
                    name="date"
                    value="{{ expense.date }}"
                    class="form-control"
                    required>

            </div>

            <button
                type="submit"
                class="btn btn-warning w-100">

                Update Expense

            </button>

        </form>

        <a href="/expenses"
           class="btn btn-outline-primary w-100 mt-3">

            Back to Expenses

        </a>

    </div>

</div>


</div>

</body>

</html>
