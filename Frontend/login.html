<!DOCTYPE html>
<html>

<head>

    <title>SpendWise - Login</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div class="min-h-screen flex items-center justify-center px-4">

    <div class="bg-white rounded-2xl shadow-lg p-6 w-full max-w-lg">

        <!-- Logo -->

        <h1 class="text-4xl font-bold text-blue-600 text-center mb-3">
            SpendWise
        </h1>

        <p class="text-slate-500 text-center text-lg mb-5">
            Track Smarter. Save Better.
        </p>

        <hr class="my-5 border-slate-300">

        <!-- Login Heading -->

        <h2 class="text-3xl font-bold text-center text-slate-800 mb-8">
            Login
        </h2>

        {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

        {% endif %}

        <form method="post">

            <!-- Email -->

            <div class="mb-4">

                <label class="block text-slate-800 text-lg mb-2">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    placeholder="Enter your email"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Password -->

            <div class="mb-6">

                <label class="block text-slate-800 text-lg mb-2">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    placeholder="Enter your password"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <!-- Login Button -->

            <button
                type="submit"
                class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-medium text-lg">

                Login

            </button>

        </form>

        <!-- Sign Up -->

        <p class="text-center mt-6 text-lg">

            Don't have an account?

            <a href="/signup"
               class="text-blue-600 hover:text-blue-700 font-medium">
                Sign Up
            </a>

        </p>

    </div>

</div>

</body>

</html>
