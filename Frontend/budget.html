{% extends "base.html" %}

{% block content %}

<div class="max-w-2xl mx-auto">

    <!-- Header -->

    <div class="mb-8">

        <h1 class="text-4xl font-bold text-slate-800">
            Monthly Budget
        </h1>

        <p class="text-slate-500 mt-1">
            Set and manage your spending limit.
        </p>

    </div>

    <!-- Budget Card -->

    <div class="bg-blue-50 border border-blue-100 rounded-2xl shadow-md p-8">

        <h3 class="text-2xl font-semibold text-slate-800 mb-6">
            Budget Settings
        </h3>

        <form method="post">

            <div class="mb-6">

                <label class="block text-slate-700 font-medium mb-2">
                    Monthly Budget
                </label>

                <input
                    type="number"
                    step="0.01"
                    name="monthly_budget"
                    placeholder="Enter Budget Amount"
                    required
                    class="w-full px-4 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">

            </div>

            <div class="flex gap-3">

                <button
                    type="submit"
                    class="bg-blue-500 text-white px-6 py-3 rounded-lg hover:bg-blue-600 transition">

                    Save Budget

                </button>

                <a href="/dashboard"
                   class="bg-slate-600 text-white px-6 py-3 rounded-lg hover:bg-slate-700 transition">

                    Back to Dashboard

                </a>

            </div>

        </form>

    </div>

</div>

{% endblock %}
